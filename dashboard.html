<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | CloudInfrastructureSolution</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #111827;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    button {
      background: #ef4444;
      border: none;
      padding: 8px 12px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .stats {
      font-size: 24px;
      color: #4f46e5;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <header>
    <h2>Dashboard</h2>

    <div class="user-info">
      <div id="avatarLetter" class="avatar">U</div>
      <span id="userEmail">User</span>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">

    <!-- USER CARD -->
    <div class="card" id="dashboardUserInfo">
      <h2>👤 My Account</h2>
      <p>Loading user...</p>
    </div>

    <!-- STATS CARD -->
    <div class="card">
      <h2>📊 Platform Stats</h2>
      <p>Total Users:</p>
      <p class="stats" id="totalUsers">...</p>
    </div>

    <!-- PLACEHOLDER FEATURE CARD -->
    <div class="card">
      <h2>🚀 Future Features</h2>
      <p>This space can show activity, logs, or projects.</p>
    </div>

  </div>

<script>
const token = localStorage.getItem("authToken");

async function loadDashboard() {
  if (!token) {
    window.location.href = "login.html";
    return;
  }

  try {
    // ✅ Get logged-in user
    const res = await fetch("https://work13-backend.onrender.com/me", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();

    if (!res.ok) {
      logout();
      return;
    }

    const user = data.user;

    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("avatarLetter").textContent =
      user.name.charAt(0).toUpperCase();

    document.getElementById("dashboardUserInfo").innerHTML = `
      <h2>👤 My Account</h2>
      <p><strong>Name:</strong> ${user.name}</p>
      <p><strong>Email:</strong> ${user.email}</p>
    `;

    // ✅ Fetch stats
    const statsRes = await fetch("https://work13-backend.onrender.com/stats");
    const stats = await statsRes.json();

    document.getElementById("totalUsers").textContent =
      stats.totalUsers;

  } catch (err) {
    console.error(err);
    logout();
  }
}

function logout() {
  localStorage.removeItem("authToken");
  localStorage.removeItem("userEmail");
  localStorage.removeItem("userName");

  window.location.href = "login.html";
}

loadDashboard();
</script>

</body>
</html>
